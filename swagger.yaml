  /resume/analyze:
    post:
      tags:
        - resume
      summary: Analyze resume with AI
      description: Submits a PDF resume for AI-powered analysis. The analysis evaluates the resume against a job description and provides strength assessment, recommendations, improvement points, and course category suggestions. Requires 1 credit per analysis.
      operationId: analyzeResume
      security:
        - userSessionCookie: []
        - adminSessionCookie: []
        - instructorSessionCookie: []
      requestBody:
        description: Resume analysis request with PDF file, job description, and experience years
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - resume
                - experience_years
                - job_description
              properties:
                resume:
                  type: string
                  format: binary
                  description: PDF file of the resume (max 2MB)
                experience_years:
                  type: string
                  description: Years of experience (e.g., "5")
                job_description:
                  type: string
                  description: Target job description for matching
      responses:
        '200':
          description: Resume analysis completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeAnalysisResponse'
        '400':
          description: Invalid request - missing required fields, invalid file type, or invalid experience_years format
        '401':
          description: Unauthorized - invalid or missing session
        '413':
          description: Payload too large - file exceeds 2MB limit
        '402':
          description: Payment required - insufficient credits
        '500':
          description: Internal server error
  /resume/:
    get:
      tags:
        - resume
      summary: Get resume analyses for current user
      description: Retrieves a paginated list of the current user's resume analysis history. Results are sorted by creation date in descending order.
      operationId: getResumeAnalyses
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            default: 1
      security:
        - userSessionCookie: []
        - adminSessionCookie: []
        - instructorSessionCookie: []
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResumeAnalyses'
        '401':
          description: Unauthorized - invalid or missing session
        '500':
          description: Internal server error
  /resume/{id}:
    get:
      tags:
        - resume
      summary: Get resume analysis by ID
      description: Retrieves a specific resume analysis by ID. Users can only access their own analyses, while admins can access any analysis.
      operationId: getResumeAnalysis
      parameters:
        - name: id
          in: path
          description: ID of the resume analysis to retrieve
          required: true
          schema:
            type: string
            format: uuid
      security:
        - userSessionCookie: []
        - adminSessionCookie: []
        - instructorSessionCookie: []
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeAnalysis'
        '400':
          description: Invalid analysis ID format
        '401':
          description: Unauthorized - invalid or missing session
        '404':
          description: Analysis not found
        '500':
          description: Internal server error
  /credits:
    get:
      tags:
        - credits
      summary: Get user credit balance
      description: Retrieves the current credit balance for the authenticated user. Credits are earned through course purchases (2 credits per single course, 2 credits per course in a bundle) and consumed by resume analyses (1 credit per analysis).
      operationId: getCredits
      security:
        - userSessionCookie: []
        - adminSessionCookie: []
        - instructorSessionCookie: []
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditsResponse'
        '401':
          description: Unauthorized - invalid or missing session
        '500':
          description: Internal server error
