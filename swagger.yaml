openapi: 3.1.0
info:
  title: Resi's Project Web Course API
  description: This is Resis's Project Web Course API docs
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
  - url: https://staging.akuanalis.com/api/v1
  - url: https://dev-api.akuanalis.com/api/v1
  - url: https://akuanalis.com/api/v1
tags:
  - name: auth
    description: For Admin and User roles authentication
  - name: course
    description: For Admin and User roles to manage course
  - name: course bundle
    description: For Admin and User roles to manage course bundle
  - name: course content
    description: For Admin and User roles to manage course content
  - name: course course forum
    description: For Admin and User roles to manage course forum
  - name: transaction
    description: For User roles to manage course transaction
  - name: user course content
    description: For User roles to manage course content
  - name: user course
    description: For User roles to manage course
  - name: account
    description: For Admin and User roles to manage account
  - name: statistics
    description: For Admin and User roles to manage statistics
  - name: search
    description: For Admin and User roles to search
  - name: free trial
    description: For Admin and User roles to manage free tier
  - name: resume
    description: For Admin, Instructor, and User roles to manage resume analysis
  - name: credits
    description: For Admin, Instructor, and User roles to manage credits

# start of paths
paths:
  /auth/whoami:
    get:
      tags:
        - auth
      summary: Get current user data
      operationId: whoami
      security:
        - userSessionCookie: []
        - adminSessionCookie: []
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
  /admin/auth/register:
    post:
      tags:
        - auth
      summary: Register for admin role
      operationId: adminRegister
      requestBody:
        description: Register form
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationForm'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
        '400':
          description: invalid email/password
  /instructors/auth/register:
    post:
      tags:
        - auth
      summary: Register for instructors role
      operationId: instructorRegister
      requestBody:
        description: Register form
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationForm'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
        '400':
          description: invalid email/password
  /users/auth/register:
    post:
      tags:
        - auth
      summary: Register for user role
      operationId: userRegister
      requestBody:
        description: Register form
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationForm'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
        '400':
          description: invalid email/password
  /admin/auth/data:
    post:
      tags:
        - auth
      summary: To complete admin data
      operationId: completeAdminData
      security:
        - adminSessionCookie: []
      requestBody:
        description: Admin data form
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminDataForm'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Admin'
        '400':
          description: invalid data
  /admin/auth/data/{adminId}:
    get:
      tags:
        - auth
      summary: Get admin data
      operationId: getAdminData
      parameters:
        - name: adminId
          in: path
          description: ID of the admin to get
          required: true
          schema:
            type: string
      security:
        - adminSessionCookie: []
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Admin'
  /instructors/auth/data:
    post:
      tags:
        - auth
      summary: To complete instructor data
      operationId: completeInstructorData
      security:
        - adminSessionCookie: []
      requestBody:
        description: Instructor data form
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstructorDataForm'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instructor'
        '400':
          description: invalid data
    put:
      tags:
        - auth
      summary: To update instructor data
      operationId: updateInstructorData
      security:
        - adminSessionCookie: []
        - instructorSessionCookie: []
      requestBody:
        description: Instructor data form
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstructorDataForm'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instructor'
        '400':
          description: invalid data
  /instructors/auth/data/{instructorId}:
    get:
      tags:
        - auth
      summary: Get instructor data
      parameters:
        - name: instructorId
          in: path
          description: ID of the instructor to get
          required: true
          schema:
            type: string
      operationId: getInstructorData
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instructor'
  /users/auth/data:
    post:
      tags:
        - auth
      summary: To complete user data
      operationId: completeUserData
      security:
        - userSessionCookie: []
      requestBody:
        description: User data form
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDataForm'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: invalid data
    put:
      tags:
        - auth
      summary: To update user data
      operationId: updateUserData
      security:
        - userSessionCookie: []
      requestBody:
        description: User data form
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDataForm'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: invalid data
  /users/auth/data/{userId}:
    get:
      tags:
        - auth
      summary: Get user data
      parameters:
        - name: userId
          in: path
          description: ID of the user to get
          required: true
          schema:
            type: string
      operationId: getUserData
      security:
        - userSessionCookie: []
        - adminSessionCookie: []
        - instructorSessionCookie: []
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /auth/activation/{activationToken}:
    post:
      tags:
        - auth
      summary: To activate admin & user account
      operationId: activateUser
      parameters:
        - name: activationToken
          in: path
          description: ID that system generate to verify the activation request
          required: true
          schema:
            type: string
      requestBody:
        description: Form to activate account
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  examples:
                    - test@yopmail.com
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: invalid activation token
  /admin/auth/login:
    post:
      tags:
        - auth
      summary: Login for admin role
      operationId: loginAdmin
      requestBody:
        description: Admin role login
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginForm'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
          headers:
            Set-Cookie:
              description: Set-Cookie
              schema:
                type: string
        '400':
          description: invalid email/password
  /instructors/auth/login:
    post:
      tags:
        - auth
      summary: Login for instructor role
      operationId: instructorLogin
      requestBody:
        description: Instructor login form
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginForm'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
        '400':
          description: invalid email/password
  /users/auth/login:
    post:
      tags:
        - auth
      summary: Login for user role
      operationId: userLogin
      requestBody:
        description: User login form
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginForm'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
        '400':
          description: invalid email/password
  /auth/logout:
    post:
      tags:
        - auth
      summary: Logout for admin and user roles
      operationId: logout
      security:
        - adminSessionCookie: []
        - userSessionCookie: []
        - instructorSessionCookie: []
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /auth/password/forgot:
    post:
      tags:
        - auth
      summary: To request reset reset token
      operationId: generateResetPasswordToken
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  examples:
                    - user@mail.com
  /auth/password/{resetToken}:
    put:
      tags:
        - auth
      summary: Reset Password for admin and user roles
      operationId: resetPassword
      parameters:
        - name: resetToken
          in: path
          description: ID that system generate to verify the reset request
          required: true
          schema:
            type: string
      requestBody:
        description: Form to reset password
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetForm'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: invalid password
    get:
      tags:
        - auth
      summary: To verify reset token
      operationId: verifyResetToken
      parameters:
        - name: resetToken
          in: path
          description: ID that system generate to verify the reset request
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The reset token is valid
        '400':
          description: invalid reset token
  /courses/categories:
    post:
      tags:
        - course
      summary: Create a new course category by admin(regular & super)
      operationId: createCourseCategory
      security:
        - sessionCookie: []
      requestBody:
        description: Course category object
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  examples:
                    - Web Development
                description:
                  type: string
                  examples:
                    - Learn web development from basics to advanced
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseCategory'
        '400':
          description: Invalid input
    get:
      tags:
        - course
      summary: Get all course categories
      operationId: getCourseCategories
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseCategory'


  /courses/categories/{categoryId}:
    get:
      tags:
        - course
      summary: Get course category by ID
      operationId: getCourseCategoryById
      parameters:
        - name: categoryId
          in: path
          description: ID of the category to get
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseCategory'
        '400':
          description: Invalid category ID
    put:
      tags:
        - course
      summary: Update course category by ID
      operationId: updateCourseCategoryById
      security:
        - adminSessionCookie: []
      parameters:
        - name: categoryId
          in: path
          description: ID of the category to update
          required: true
          schema:
            type: string
      requestBody:
        description: Course category object
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  examples:
                    - Web Development
                description:
                  type: string
                  examples:
                    - Learn web development from basics to advanced
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseCategory'
        '400':
          description: Invalid input
    delete:
      tags:
        - course
      summary: Delete course category by ID
      operationId: deleteCourseCategoryById
      security:
        - adminSessionCookie: []
      parameters:
        - name: categoryId
          in: path
          description: ID of the category to delete
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Invalid category ID
  /courses:
    post:
      tags:
        - course
      summary: Create a new course by admin(regular & super)
      operationId: createCourse
      security:
        - adminSessionCookie: []
      requestBody:
        description: Course object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseForm'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '400':
          description: Invalid input
    get:
      tags:
        - course
      summary: Get all courses
      parameters:
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer
            default: 1
      operationId: getCourses
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponsePagination'
  /courses/instructors:
    get:
      tags:
        - course
      summary: Get all course categories with instructors
      operationId: getCourseCategoriesWithInstructors
      security:
        - adminSessionCookie: []
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InstructorResponse'

  /courses/{courseId}:
    get:
      tags:
        - course
      summary: Get course by ID
      operationId: getCourseById
      parameters:
        - name: courseId
          in: path
          description: ID of the course to get
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '400':
          description: Invalid course ID
    put:
      tags:
        - course
      summary: Update course by ID
      operationId: updateCourseById
      security:
        - adminSessionCookie: []
      parameters:
        - name: courseId
          in: path
          description: ID of the course to update
          required: true
          schema:
            type: string
      requestBody:
        description: Course object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseForm'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '400':
          description: Invalid input
    delete:
      tags:
        - course
      summary: Delete course by ID
      operationId: deleteCourseById
      security:
        - adminSessionCookie: []
      parameters:
        - name: courseId
          in: path
          description: ID of the course to delete
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Invalid course ID
  /courses/{courseId}/thumbnail:
    put:
      tags:
        - course
      summary: Update course thumbnail by ID
      operationId: updateCourseThumbnailById
      security:
        - adminSessionCookie: []
      parameters:
        - name: courseId
          in: path
          description: ID of the course to update
          required: true
          schema:
            type: string
      requestBody:
        description: Course thumbnail object
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                thumbnail_image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Successful operation
        '400':
          description: Invalid input
  /instructor/courses:
    get:
      tags:
        - course
      summary: Get all courses
      security:
        - instructorSessionCookie: []
      parameters:
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer
            default: 1
      operationId: getCoursesInstructor
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponsePagination'
  /courses/bundles:
    post:
      tags:
        - course bundle
      summary: Create a new course bundle by admin(regular & super)
      operationId: createCourseBundle
      security:
        - adminSessionCookie: []
      requestBody:
        description: Course bundle object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseBundleForm'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseBundle'
        '400':
          description: Invalid input
    get:
      tags:
        - course bundle
      summary: Get all course bundles
      parameters:
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer
            default: 1
      operationId: getCourseBundles
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseBundlePagination'
  /courses/bundles/{courseBundleId}:
    get:
      tags:
        - course bundle
      summary: Get course bundle by ID
      operationId: getCourseBundleById
      parameters:
        - name: courseBundleId
          in: path
          description: ID of the course bundle to get
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseBundle'
        '400':
          description: Invalid course bundle ID
    put:
      tags:
        - course bundle
      summary: Update course bundle by ID
      operationId: updateCourseBundleById
      security:
        - sessionCookie: []
      parameters:
        - name: courseBundleId
          in: path
          description: ID of the course bundle to update
          required: true
          schema:
            type: string
      requestBody:
        description: Course bundle object
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  examples:
                    - Web Development
                description:
                  type: string
                  examples:
                    - Learn how to build a website
                price:
                  type: number
                  examples:
                    - 100000
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Invalid input
    delete:
      tags:
        - course bundle
      summary: Delete course bundle by ID
      operationId: deleteCourseBundleById
      security:
        - adminSessionCookie: []
      parameters:
        - name: courseBundleId
          in: path
          description: ID of the course bundle to delete
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Invalid course bundle ID
  /courses/bundles/{courseBundleId}/thumbnail:
    put:
      tags:
        - course bundle
      summary: Update course bundle thumbnail by ID
      operationId: updateCourseBundleThumbnailById
      security:
        - adminSessionCookie: []
      parameters:
        - name: courseBundleId
          in: path
          description: ID of the course bundle to update
          required: true
          schema:
            type: string
      requestBody:
        description: Course bundle thumbnail object
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                thumbnail_image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Successful operation
        '400':
          description: Invalid input
  /courses/bundles/{courseBundleId}/courses:
    post:
      tags:
        - course bundle
      summary: Add course to course bundle by ID
      operationId: addCourseToCourseBundle
      security:
        - adminSessionCookie: []
      parameters:
        - name: courseBundleId
          in: path
          description: ID of the course bundle to add course
          required: true
          schema:
            type: string
      requestBody:
        description: Course object
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
                examples:
                  - 5f7b1b3b7f3b9b0017b3b9b0
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  format: uuid
                  examples:
                    - 5f7b1b3b7f3b9b0017b3b9b0
        '400':
          description: Invalid input
    get:
      tags:
        - course bundle
      summary: Get all courses in course bundle
      operationId: getCoursesInCourseBundle
      parameters:
        - name: courseBundleId
          in: path
          description: ID of the course bundle to get
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  format: uuid
                  examples:
                    - 5f7b1b3b7f3b9b0017b3b9b0
        '400':
          description: Invalid course bundle ID
    delete:
      tags:
        - course bundle
      summary: Delete course from course bundle by ID
      operationId: deleteCourseFromCourseBundle
      security:
        - adminSessionCookie: []
      parameters:
        - name: courseBundleId
          in: path
          description: ID of the course bundle to delete course
          required: true
          schema:
            type: string
      requestBody:
        description: Course object
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
                examples:
                  - 5f7b1b3b7f3b9b0017b3b9b0
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  format: uuid
                  examples:
                    - 5f7b1b3b7f3b9b0017b3b9b0
        '400':
          description: Invalid input
  /courses/{courseId}/contents:
    post:
      tags:
        - course content
      summary: Create a new course content by admin(regular & super)
      operationId: createCourseContent
      security:
        - adminSessionCookie: []
      requestBody:
        description: Course content object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseContentForm'
          multipart/form-data:
            schema:
              type: object
              properties:
                video_content:
                  type: string
                  format: binary
                video_thumbnail:
                  type: string
                  format: binary
                additional_source:
                  type: string
                  format: binary
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseContent'
        '400':
          description: Invalid input
    get:
      tags:
        - course content
      summary: Get all course contents
      operationId: getCourseContents
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseContent'
  /courses/{courseId}/contents/{contentId}:
    get:
      tags:
